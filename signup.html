<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | StudyTime</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="studytime.html" class="brand">
            <img src="logostudy.png" alt="StudyTime" style="height: 200px; width: 300px; display: block;" />
        </a>
        <nav>
            <ul>
                <li><a href="studytime.html">Início</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="login-section">
            <div class="login-card">
                <h2>Criar conta no StudyTime</h2>
                <p>Cadastre-se para gerenciar seus lembretes e sua rotina de estudos.</p>
                <form class="login-form" action="#" method="post">
                    <div class="form-group">
                        <label for="name">Nome</label>
                        <input type="text" id="name" name="name" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" placeholder="Crie uma senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Criar conta</button>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 <a href="https://www.linkedin.com/in/ingridmarreiro/">Ingrid Marreiro</a>. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
